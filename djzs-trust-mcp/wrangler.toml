name = "djzs-trust-mcp"
main = "src/index.ts"
# Date ≥ 2024-09-23 makes nodejs_compat define a global `process`. That flips the
# transitively-bundled server/claude-client.ts:3 (`process.env.ANTHROPIC_API_KEY`)
# from a module-scope THROW (Cloudflare 10021 "process is not defined") to a benign
# `undefined` read — that module is dead code here; the tool reads its key from the
# request-scoped c.env, unchanged. See KNOWN ISSUE in CLAUDE.md (server-scoped split
# is the real fix).
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# PoL write target. MAINNET (A11 Stage 3, 2026-07-14): certs are permanent and
# visible to query_pol_certificates. Requires the IRYS_UPLOAD_KEY secret to be
# the FUNDED mainnet key (proven in isolation, cert 747n8SZq...); an unfunded key
# makes anchoring fail-open and paying callers get status:"error" — the weak
# offer the spec rejects. Set the prod secret before deploy; probe /health/x402.
IRYS_NODE_URL = "https://uploader.irys.xyz"

# Module aliasing (wrangler → esbuild): resolve the engine's `@shared/*` imports at
# bundle time WITHOUT editing any file under shared/. esbuild remaps the "@shared"
# specifier and its subpaths (e.g. @shared/audit-schema) to ../shared, resolved
# relative to this wrangler.toml. djzs-trust-mcp/ sits at the repo root next to
# shared/, so the hop up is a single "../". Minimal wrangler-native mechanism —
# no custom build step, no copied files.
#
# SECRET: ANTHROPIC_API_KEY is set via `wrangler secret put ANTHROPIC_API_KEY` and read
# from the request-time env binding (see src/index.ts). It is NEVER a [vars] entry.
# SECRET: IRYS_UPLOAD_KEY (EVM private key hex signing PoL DataItems) likewise via
# `wrangler secret put IRYS_UPLOAD_KEY`, read request-time. Key choice and funding
# are DJ's alone (D5). Absent secret => anchoring reports "disabled"; audits run.
[alias]
"@shared" = "../shared"
